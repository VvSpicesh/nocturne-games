<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="theme-color" content="#08111f">
  <title>Nocturne Games</title>
  <link rel="stylesheet" href="./shared/base.css">
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark">◐</div>
        <div>
          <h1>Nocturne Games</h1>
          <p>把一点空闲，变成一场游戏。</p>
        </div>
      </div>
      <span class="pill">HTML · GitHub Pages Ready</span>
    </header>

    <section class="hero panel">
      <div>
        <span class="eyebrow">GAME COLLECTION</span>
        <h2>夜色里的小游戏收藏馆</h2>
        <p>国际象棋已经起步，四川麻将正在搭建。所有游戏都采用独立模块，适合在 Cursor 中长期维护。</p>
      </div>
      <div class="hero-symbols">♞ 🀄</div>
    </section>

    <section class="game-grid">
      <a class="game-card panel" href="./chess/">
        <div class="cover chess-cover">♞</div>
        <div class="card-body">
          <span class="tag">PLAYABLE FRAMEWORK</span>
          <h3>Nocturne Chess</h3>
          <p>棋盘、状态栏、走棋引擎接口和 AI 模块已经拆分。</p>
          <span class="button-link">进入国际象棋 →</span>
        </div>
      </a>

      <a class="game-card panel" href="./mahjong/">
        <div class="cover mahjong-cover">🀄</div>
        <div class="card-body">
          <span class="tag">EARLY FRAMEWORK</span>
          <h3>Nocturne Mahjong</h3>
          <p>四川血战到底框架，包含牌桌、四方座位、弃牌区和独立规则模块。</p>
          <span class="button-link">进入四川麻将 →</span>
        </div>
      </a>
    </section>
  </main>
  <script src="./shared/app.js"></script>
</body>
</html>
