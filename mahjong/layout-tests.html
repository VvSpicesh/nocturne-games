<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Nocturne Mahjong Layout Tests v0.16</title>
  <link rel="stylesheet" href="./style.css?v=0.16.12">
  <link rel="stylesheet" href="./table.css?v=0.16.12">
  <style>
    :root { color-scheme: dark; }
    body.layout-test-page {
      margin: 0;
      font-family: "Segoe UI", "PingFang SC", sans-serif;
      background: #0a1612;
      color: #e8f0ec;
    }
    .lt-shell { display: grid; grid-template-columns: 300px 1fr; min-height: 100dvh; }
    .lt-panel {
      padding: 14px;
      border-right: 1px solid rgba(255,255,255,.1);
      background: #0d1f18;
      overflow: auto;
    }
    .lt-panel h1 { font-size: 16px; margin: 0 0 8px; }
    .lt-panel p { font-size: 12px; color: #9bb; margin: 0 0 12px; line-height: 1.45; }
    .lt-panel button, .lt-panel label {
      display: block; width: 100%; margin: 0 0 8px;
      box-sizing: border-box;
    }
    .lt-panel button {
      padding: 10px 12px; border-radius: 10px; border: 1px solid rgba(239,199,104,.4);
      background: #145c3c; color: #fff; font-weight: 700; cursor: pointer;
    }
    .lt-panel button.secondary { background: #1a2e26; }
    .lt-panel button:disabled { opacity: .45; cursor: not-allowed; }
    .lt-sum {
      padding: 10px; border-radius: 10px; margin-bottom: 12px;
      background: #122820; font-size: 13px; font-weight: 700;
    }
    .lt-sum.pass { outline: 2px solid #3d9; }
    .lt-sum.fail { outline: 2px solid #e55; }
    .lt-log {
      font-family: ui-monospace, Consolas, monospace;
      font-size: 11px; white-space: pre-wrap; max-height: 28vh; overflow: auto;
      background: #07140f; padding: 8px; border-radius: 8px;
    }
    .lt-main { padding: 16px; overflow: auto; }
    .lt-preview-bar {
      display: flex; flex-wrap: wrap; gap: 8px; align-items: center;
      margin-bottom: 12px; padding: 10px 12px; border-radius: 12px;
      background: #0d1f18; border: 1px solid rgba(255,255,255,.1);
    }
    .lt-preview-bar strong { font-size: 12px; color: #9bb; margin-right: 4px; }
    .vp-chip {
      border: 1px solid rgba(239,199,104,.35);
      background: #1a2e26; color: #e8f0ec;
      border-radius: 999px; padding: 6px 12px; font-size: 12px; font-weight: 700;
      cursor: pointer;
    }
    .vp-chip.active { background: #145c3c; outline: 2px solid #efc768; }
    .vp-chip.fail { outline-color: #e55; }
    .vp-chip.pass { outline-color: #3d9; }
    .lt-preview-bar select, .lt-preview-bar button {
      padding: 6px 10px; border-radius: 8px; border: 1px solid rgba(255,255,255,.2);
      background: #145c3c; color: #fff; font-weight: 700; cursor: pointer;
    }
    .lt-preview-bar label.scale {
      display: flex; align-items: center; gap: 6px; font-size: 12px; color: #9bb;
      width: auto; margin: 0;
    }
    .lt-stage-wrap {
      overflow: auto;
      max-height: calc(100dvh - 220px);
      padding: 12px;
      background: #08160f;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,.08);
    }
    .layout-stage {
      margin: 0 auto;
      background: #062218;
      border: 1px dashed rgba(255,255,255,.2);
      overflow: hidden;
      position: relative;
      transform-origin: top center;
    }
    .layout-stage .table {
      width: 100% !important;
      height: 100% !important;
      max-width: none !important;
      max-height: none !important;
      aspect-ratio: auto !important;
      border-radius: 12px;
    }
    .layout-stage:fullscreen,
    .layout-stage:-webkit-full-screen {
      width: 100vw !important;
      height: 100vh !important;
      max-width: none;
      background: #062218;
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      transform: none !important;
    }
    .layout-stage:fullscreen .table,
    .layout-stage:-webkit-full-screen .table {
      width: min(100vw, calc(100vh * var(--fs-aspect, 1))) !important;
      height: min(100vh, calc(100vw / var(--fs-aspect, 1))) !important;
    }
    .lt-gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 12px;
      margin: 16px 0;
    }
    .lt-card {
      background: #0d1f18; border: 1px solid rgba(255,255,255,.12);
      border-radius: 12px; padding: 10px; cursor: pointer;
    }
    .lt-card:hover { border-color: #efc768; }
    .lt-card.active { outline: 2px solid #efc768; }
    .lt-card h3 { margin: 0 0 6px; font-size: 13px; }
    .lt-card .meta { font-size: 11px; color: #9bb; margin-bottom: 8px; }
    .lt-card .thumb {
      width: 100%; aspect-ratio: 16/10; background: #062218;
      border-radius: 8px; display: grid; place-items: center;
      font-size: 12px; color: #9bb; border: 1px dashed rgba(255,255,255,.15);
      overflow: hidden;
    }
    .lt-card .thumb img { width: 100%; height: 100%; object-fit: contain; }
    #reportMount { margin-top: 20px; }
    #reportMount table { border-collapse: collapse; width: 100%; font-size: 12px; }
    #reportMount th, #reportMount td {
      border: 1px solid rgba(255,255,255,.15); padding: 6px 8px; text-align: left;
    }
    #reportMount .ok { color: #6d6; }
    #reportMount .bad { color: #f88; }
    #reportMount img { max-width: 180px; border: 1px solid #333; }
  </style>
</head>
<body class="layout-test-page">
  <div class="lt-shell">
    <aside class="lt-panel">
      <h1>Layout Tests v0.16</h1>
      <p><strong>看各尺寸样子：</strong><br>
        Stress/矩阵跑完后，点右侧上方的<strong>尺寸芯片</strong>，或下方<strong>预览卡片</strong>。<br>
        「全屏看桌」可放大当前尺寸；用缩放滑条适配窗口。<br><br>
        <strong>自动化：</strong>勿勾截图/Golden → 跑 Stress → 看 PASS。<br>
        Debug Overlay：手牌蓝 / 副露黄 / 弃牌绿 / 中央粉。
      </p>
      <div id="summary" class="lt-sum">尚未运行</div>
      <button type="button" id="btnRunFixed">运行固定矩阵</button>
      <button type="button" id="btnRunStress" class="secondary">运行 Stress</button>
      <button type="button" id="btnRunRandom" class="secondary">Random Stress ×1000</button>
      <button type="button" id="btnAll" class="secondary">全部（固定+Stress+Random）</button>
      <button type="button" id="btnPromote" class="secondary">Promote 截图 → Golden</button>
      <button type="button" id="btnDebug" class="secondary">切换 Debug Overlay</button>
      <button type="button" id="btnDownloadReport" class="secondary">下载 HTML 报告</button>
      <label><input type="checkbox" id="chkShot"> 生成截图（需联网；也可用于预览缩略图）</label>
      <label><input type="checkbox" id="chkGolden"> Golden 对比（先跑截图再 Promote）</label>
      <p id="bootHint" style="color:#f6b;font-size:12px;margin:8px 0"></p>
      <div class="lt-log" id="log">正在加载脚本…</div>
      <p style="margin-top:12px"><a href="./index.html">← 返回牌局</a></p>
    </aside>
    <main class="lt-main">
      <div class="lt-preview-bar">
        <strong>尺寸</strong>
        <div id="vpChips" style="display:flex;flex-wrap:wrap;gap:6px"></div>
        <strong>场景</strong>
        <select id="scenarioPick">
          <option value="stress">stress（满载）</option>
          <option value="empty-melds">empty-melds</option>
          <option value="melds-4">melds-4</option>
          <option value="discards-24">discards-24</option>
          <option value="action-dock">action-dock</option>
          <option value="fx">fx</option>
          <option value="reveal">reveal</option>
        </select>
        <button type="button" id="btnApplyPreview">套用到舞台</button>
        <button type="button" id="btnFullscreen">全屏看桌</button>
        <label class="scale">缩放
          <input type="range" id="stageScale" min="25" max="100" value="55">
          <span id="scaleLabel">55%</span>
        </label>
      </div>
      <div class="lt-stage-wrap" id="stageWrap">
        <div class="layout-stage" id="stage" style="width:390px;height:844px">
          <div class="table" id="testTable" data-layout="portrait" data-debug-layout="off">
            <section class="zone zone-n-info" id="info-2"></section>
            <section class="zone zone-n-hand"><div class="seat seat-top" id="seat-2"></div></section>
            <section class="zone zone-n-meld"><div class="meld-zone meld-top" id="meld-2"></div></section>
            <section class="zone zone-n-disc"><div class="discard-zone discard-top" id="discard-2"></div></section>

            <section class="zone zone-w-info" id="info-1"></section>
            <section class="zone zone-w-hand"><div class="seat seat-left" id="seat-1"></div></section>
            <section class="zone zone-w-meld"><div class="meld-zone meld-left" id="meld-1"></div></section>
            <section class="zone zone-w-disc"><div class="discard-zone discard-left" id="discard-1"></div></section>

            <section class="zone zone-e-info" id="info-3"></section>
            <section class="zone zone-e-hand"><div class="seat seat-right" id="seat-3"></div></section>
            <section class="zone zone-e-meld"><div class="meld-zone meld-right" id="meld-3"></div></section>
            <section class="zone zone-e-disc"><div class="discard-zone discard-right" id="discard-3"></div></section>

            <section class="zone zone-s-info" id="info-0"></section>
            <section class="zone zone-s-hand"><div class="seat seat-bottom" id="seat-0"></div></section>
            <section class="zone zone-s-meld"><div class="meld-zone meld-bottom" id="meld-0"></div></section>
            <section class="zone zone-s-disc"><div class="discard-zone discard-bottom" id="discard-0"></div></section>

            <div class="table-center" id="table-center">
              <div class="remaining" id="remaining">59</div>
              <div class="phase" id="phase">出牌</div>
              <div class="turn" id="turn">轮到：自己</div>
            </div>

            <div class="table-overlay">
              <div id="actionDock" class="action-dock">
                <div id="actionDockText" class="action-dock-text"></div>
                <div id="actionDockButtons" class="action-dock-buttons"></div>
              </div>
            </div>
          </div>
        </div>
      </div>
      <h2 style="font-size:14px;margin:16px 0 8px">尺寸预览卡（点卡片切换舞台）</h2>
      <div class="lt-gallery" id="gallery"></div>
      <div id="reportMount"></div>
    </main>
  </div>
  <script type="module" src="./layout-tests.js?v=0.16.12"></script>
  <script>
    setTimeout(() => {
      if (window.__LAYOUT_TESTS_BOOTED__) return;
      const log = document.getElementById("log");
      const hint = document.getElementById("bootHint");
      const file = location.protocol === "file:";
      const msg = file
        ? "请用本地 HTTP 打开（勿直接双击 file://）。在 mahjong 目录执行：python -m http.server 8877，再打开 http://127.0.0.1:8877/layout-tests.html"
        : "脚本未就绪：请打开 F12 → Console 查看红色报错。";
      if (hint) hint.textContent = msg;
      if (log) log.textContent = msg;
    }, 3000);
  </script>
</body>
</html>
