<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
  <meta name="theme-color" content="#0b251b">
  <title>Nocturne Mahjong v0.9</title>
  <link rel="stylesheet" href="./style.css?v=0.9">
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div class="brand">
        <div class="logo">🀄</div>
        <div>
          <h1>Nocturne Mahjong</h1>
          <p>四川麻将 · 血战到底 · 家庭大字版 v0.9</p>
        </div>
      </div>
      <button id="newGameBtn" class="btn btn-primary">新牌局</button>
    </header>

    <section class="quick-rules">
      <div class="quick-rules-title">
        <strong>本局规则</strong>
        <span>新牌局生效</span>
      </div>

      <label class="quick-rule">
        <input id="ruleExchange" type="checkbox" checked>
        <span class="quick-switch"></span>
        <span class="quick-rule-text">
          <strong>换三张</strong>
          <small>任意三张，可混合花色</small>
        </span>
      </label>

      <label class="quick-rule">
        <input id="ruleGang" type="checkbox" checked>
        <span class="quick-switch"></span>
        <span class="quick-rule-text">
          <strong>刮风下雨</strong>
          <small>启用碰杠与杠分规则</small>
        </span>
      </label>
    </section>

    <section class="game-layout">
      <div class="table">
        <div class="seat seat-top" id="seat-2"></div>
        <div class="seat seat-left" id="seat-1"></div>
        <div class="seat seat-right" id="seat-3"></div>
        <div class="seat seat-bottom" id="seat-0"></div>

        <div class="meld-zone meld-top" id="meld-2"></div>
        <div class="meld-zone meld-left" id="meld-1"></div>
        <div class="meld-zone meld-right" id="meld-3"></div>
        <div class="meld-zone meld-bottom" id="meld-0"></div>

        <div class="discard-zone discard-top" id="discard-2"></div>
        <div class="discard-zone discard-left" id="discard-1"></div>
        <div class="discard-zone discard-right" id="discard-3"></div>
        <div class="discard-zone discard-bottom" id="discard-0"></div>

        <div class="table-center">
          <div class="remaining" id="remaining">108</div>
          <div class="phase" id="phase">准备</div>
          <div class="turn" id="turn">等待开始</div>
        </div>

        <div id="actionDock" class="action-dock" aria-live="polite">
          <div id="actionDockText" class="action-dock-text"></div>
          <div id="actionDockButtons" class="action-dock-buttons"></div>
        </div>
      </div>

      <aside class="sidebar">
        <section class="card">
          <h2>牌局状态</h2>
          <div class="stats">
            <div><span>阶段</span><strong id="statPhase">准备</strong></div>
            <div><span>当前玩家</span><strong id="statTurn">你</strong></div>
            <div><span>剩余牌</span><strong id="statWall">108</strong></div>
            <div><span>你的状态</span><strong id="statStatus">未胡</strong></div>
          </div>
        </section>

        <section class="card">
          <h2>操作提示</h2>
          <div id="actions" class="actions"></div>
        </section>

        <section class="card card-log">
          <h2>牌局记录</h2>
          <div id="log" class="log"></div>
        </section>

        <section class="card note">
          摸牌自动完成。新摸到的牌会抬高并与其他牌分开。出牌时先点一次选中，再点同一张确认打出。
        </section>
      </aside>
    </section>
  </main>

  <div id="exchangeModal" class="modal">
    <div class="modal-box">
      <h2>换三张</h2>
      <p>任意选择三张牌，不限制花色。再次点击可取消。</p>
      <div id="exchangeHand" class="exchange-hand"></div>
      <div class="modal-actions">
        <button id="exchangeConfirm" class="btn btn-primary" disabled>确认换牌</button>
      </div>
    </div>
  </div>

  <div id="winModal" class="modal">
    <div class="modal-box reaction-box">
      <h2>胡牌</h2>
      <div id="winTitle" class="win-title"></div>
      <p id="winDetail"></p>
      <div class="modal-actions">
        <button id="winContinue" class="btn btn-primary">继续血战</button>
      </div>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script type="module" src="./game.js?v=0.9"></script>
</body>
</html>
