<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
  <meta name="theme-color" content="#10261d">
  <title>Nocturne Mahjong</title>
  <link rel="stylesheet" href="./style.css?v=0.4-mobile-fix">
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div class="brand">
        <div class="logo">🀄</div>
        <div>
          <h1>Nocturne Mahjong</h1>
          <p>四川麻将 · 血战到底 · 家庭大字版</p>
        </div>
      </div>
      <button id="newGameBtn" class="btn btn-primary">新牌局</button>
    </header>

    <section class="game-layout">
      <div class="table" id="table">
        <div class="seat seat-top" id="seat-2"></div>
        <div class="seat seat-left" id="seat-1"></div>
        <div class="seat seat-right" id="seat-3"></div>
        <div class="seat seat-bottom" id="seat-0"></div>

        <div class="discard-zone discard-top" id="discard-2"></div>
        <div class="discard-zone discard-left" id="discard-1"></div>
        <div class="discard-zone discard-right" id="discard-3"></div>
        <div class="discard-zone discard-bottom" id="discard-0"></div>

        <div class="table-center">
          <div class="remaining" id="remaining">108</div>
          <div class="phase" id="phase">准备</div>
          <div class="turn" id="turn">等待开始</div>
        </div>
      </div>

      <aside class="sidebar">
        <section class="card rules-card">
          <div class="card-title-row">
            <h2>规则设置</h2>
            <span class="rules-hint">新牌局生效</span>
          </div>

          <label class="rule-toggle">
            <span>
              <strong>换三张</strong>
              <small>可任意选择三张，不限制花色</small>
            </span>
            <input id="ruleExchange" type="checkbox" checked>
            <i></i>
          </label>

          <label class="rule-toggle">
            <span>
              <strong>刮风下雨</strong>
              <small>启用杠牌相关规则与后续结算</small>
            </span>
            <input id="ruleGang" type="checkbox" checked>
            <i></i>
          </label>
        </section>

        <section class="card">
          <h2>牌局状态</h2>
          <div class="stats">
            <div><span>阶段</span><strong id="statPhase">准备</strong></div>
            <div><span>当前玩家</span><strong id="statTurn">你</strong></div>
            <div><span>剩余牌</span><strong id="statWall">108</strong></div>
            <div><span>状态</span><strong id="statStatus">未胡</strong></div>
          </div>
        </section>

        <section class="card">
          <h2>操作</h2>
          <div id="actions" class="actions"></div>
        </section>

        <section class="card card-log">
          <h2>牌局记录</h2>
          <div id="log" class="log"></div>
        </section>

        <section class="card note">
          出牌方式：先点一次选中，牌会抬高；再点同一张才真正打出。摸牌自动完成，新摸到的牌会单独抬起显示。
        </section>
      </aside>
    </section>
  </main>

  <div id="exchangeModal" class="modal">
    <div class="modal-box">
      <h2>换三张</h2>
      <p>任选三张牌。再次点击可取消选择。</p>
      <div id="exchangeHand" class="exchange-hand"></div>
      <div class="modal-actions">
        <button id="exchangeConfirm" class="btn btn-primary" disabled>确认换牌</button>
      </div>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script type="module" src="./game.js"></script>
</body>
</html>
